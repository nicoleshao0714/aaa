name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  release:
    types: [created, published, prereleased, released]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make

    - name: Build
      shell: msys2 {0}
      run: |
        mingw32-make

    - name: Package Release
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path release_pkg
        Copy-Item ChineseStrokeIME.exe release_pkg/
        Copy-Item user_dict.txt release_pkg/
        Rename-Item release_pkg ChineseStrokeIME
        Compress-Archive -Path ChineseStrokeIME -DestinationPath ChineseStrokeIME_Release.zip

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v6
      with:
        name: ChineseStrokeIME-Build
        path: ChineseStrokeIME.exe

    - name: Create or Update GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
      uses: softprops/action-gh-release@v3
      with:
        files: ChineseStrokeIME_Release.zip
        generate_release_notes: true
