name: Build ChineseStrokeIME

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: mingw-w64-x86_64-gcc make

    - name: Build with MSYS2
      run: |
        cd ChineseStrokeIME_Ver2_SourceCode
        make

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ChineseStrokeIME
        path: ChineseStrokeIME_Ver2_SourceCode/ChineseStrokeIME.exe
